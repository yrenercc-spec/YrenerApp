name: Build Yrener ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Build Dobby
      run: |
        git clone --depth=1 https://github.com/jmpews/Dobby.git _dobby
        mkdir -p libs/Dobby/include
        cp -r _dobby/include/* libs/Dobby/include/

        # Патчим .asm через Python — надёжнее чем sed
        python3 - << 'PYEOF'
        import re
        path = "_dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm"
        with open(path, "r") as f:
            content = f.read()
        content = re.sub(r'adrp (x\d+), (\S+)@PAGE', r'adr \1, \2', content)
        content = re.sub(r'add (x\d+), (x\d+), \S+@PAGEOFF\n', '', content)
        with open(path, "w") as f:
            f.write(content)
        print("Patched OK")
        PYEOF

        cat _dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm

        cd _dobby && mkdir build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE="${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release \
          -DDOBBY_DEBUG=OFF
        make dobby -j$(nproc)
        cp libdobby.a ../../libs/Dobby/libdobby.a
        echo "Dobby OK"

    - name: Build YrenerMod
      run: |
        mkdir -p build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE="${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        ls -lh libYrenerMod.so

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: libYrenerMod-arm64
        path: build/libYrenerMod.so

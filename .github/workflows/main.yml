name: Build Yrener ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Patch and Build Dobby
      run: |
        git clone --depth=1 https://github.com/jmpews/Dobby.git _dobby
        mkdir -p libs/Dobby/include
        cp -r _dobby/include/* libs/Dobby/include/
        ASM="_dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm"
        sed -i 's/adrp x17, \(.*\)@PAGE/adr x17, \1/' "$ASM"
        sed -i '/add x17, x17,.*@PAGEOFF/d' "$ASM"
        cd _dobby && mkdir build && cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE="${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 -DCMAKE_BUILD_TYPE=Release -DDOBBY_DEBUG=OFF
        make dobby -j$(nproc)
        cp libdobby.a ../../libs/Dobby/libdobby.a

    - name: Build YrenerMod
      run: |
        mkdir -p build && cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE="${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake" -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: libYrenerMod-arm64
        path: build/libYrenerMod.so

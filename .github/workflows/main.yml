name: Build YrenerMod ARM64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c
        add-to-path: true

    # ФИКС: собираем Dobby с правильным флагом ASM для Linux
    # Ошибка @PAGE/@PAGEOFF = macOS синтаксис, на Linux не работает
    - name: Build Dobby for ARM64
      run: |
        git clone --depth=1 https://github.com/jmpews/Dobby.git _dobby
        mkdir -p libs/Dobby/include
        cp -r _dobby/include/* libs/Dobby/include/
        cd _dobby && mkdir build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release \
          -DDOBBY_DEBUG=OFF \
          -DEnableObfuscation=OFF \
          -DGenerateInlineHook=ON \
          -DCMAKE_ASM_FLAGS="--target=aarch64-linux-android21"
        make dobby -j$(nproc)
        cp libdobby.a ../../libs/Dobby/libdobby.a
        echo "[OK] Dobby готов!"
        ls -lh ../../libs/Dobby/

    - name: Build YrenerMod
      run: |
        mkdir -p build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        echo "[OK] libYrenerMod.so собран!"
        ls -lh libYrenerMod.so

    - name: Upload libYrenerMod.so
      uses: actions/upload-artifact@v3
      with:
        name: libYrenerMod-arm64
        path: build/libYrenerMod.so
        
